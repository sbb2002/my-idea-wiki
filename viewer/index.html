<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이디어 위키</title>
<style>
  /* ── 변수 ─────────────────────────────────────────────────── */
  :root {
    --bg:        #0e0f11;
    --surface:   #16181c;
    --surface2:  #1e2026;
    --border:    #2a2d35;
    --accent:    #5b8dee;
    --accent2:   #3ecf8e;
    --text:      #e8eaf0;
    --text-muted:#7a8099;
    --text-dim:  #4a5068;
    --tag-bg:    #1a2540;
    --tag-fg:    #5b8dee;
    --sidebar-w: 280px;
    --header-h:  52px;
    --font-sans: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --radius:    8px;
    --shadow:    0 4px 24px rgba(0,0,0,.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── 헤더 ─────────────────────────────────────────────────── */
  #header {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
    z-index: 10;
  }
  #header .logo {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -.3px;
    color: var(--text);
    white-space: nowrap;
  }
  #header .logo span { color: var(--accent); }
  #search-wrap {
    flex: 1;
    max-width: 360px;
    position: relative;
  }
  #search {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 7px 12px 7px 34px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--font-sans);
    outline: none;
    transition: border-color .15s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-dim); }
  #search-wrap .icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
    pointer-events: none;
  }
  #meta {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ── 레이아웃 ─────────────────────────────────────────────── */
  #layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── 사이드바 ─────────────────────────────────────────────── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  #sidebar-header {
    padding: 14px 16px 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  #item-count {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: none;
    letter-spacing: 0;
  }
  #item-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  #item-list::-webkit-scrollbar { width: 4px; }
  #item-list::-webkit-scrollbar-track { background: transparent; }
  #item-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .item-entry {
    padding: 9px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .1s, border-color .1s;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .item-entry:hover { background: var(--surface2); }
  .item-entry.active {
    background: var(--surface2);
    border-left-color: var(--accent);
  }
  .item-entry .entry-title {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-entry.active .entry-title { color: var(--accent); }
  .item-entry .entry-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .entry-tags {
    display: flex;
    gap: 4px;
    flex-wrap: nowrap;
    overflow: hidden;
  }
  .entry-tag {
    font-size: 10px;
    background: var(--tag-bg);
    color: var(--tag-fg);
    border-radius: 3px;
    padding: 1px 5px;
    white-space: nowrap;
  }

  /* ── 메인 콘텐츠 ──────────────────────────────────────────── */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 36px 48px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }
  #main::-webkit-scrollbar { width: 5px; }
  #main::-webkit-scrollbar-track { background: transparent; }
  #main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* 빈 상태 */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text-dim);
  }
  #empty-state .icon { font-size: 40px; opacity: .4; }
  #empty-state p { font-size: 14px; }

  /* 위키 문서 */
  #wiki-doc { display: none; flex-direction: column; gap: 32px; }
  #wiki-doc.visible { display: flex; }

  /* 문서 헤더 */
  .doc-header { display: flex; flex-direction: column; gap: 12px; }
  .doc-title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -.5px;
    line-height: 1.2;
    color: var(--text);
  }
  .doc-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .doc-tag {
    font-size: 12px;
    background: var(--tag-bg);
    color: var(--tag-fg);
    border: 1px solid rgba(91,141,238,.25);
    border-radius: 5px;
    padding: 2px 9px;
  }
  .doc-updated {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* 섹션 */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .section-header {
    padding: 13px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-header .s-icon {
    font-size: 14px;
    opacity: .7;
  }
  .section-header .s-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .section-body { padding: 20px; }

  /* 개요 */
  .summary-text {
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
  }

  /* 버전 타임라인 */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .tl-item {
    display: flex;
    gap: 16px;
    position: relative;
  }
  .tl-item:not(:last-child)::after {
    content: '';
    position: absolute;
    left: 71px;
    top: 28px;
    bottom: -1px;
    width: 1px;
    background: var(--border);
  }
  .tl-left {
    width: 72px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    padding-top: 4px;
    gap: 2px;
  }
  .tl-week {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    white-space: nowrap;
  }
  .tl-dot-wrap {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 0;
  }
  .tl-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--border);
    border: 2px solid var(--surface);
    flex-shrink: 0;
    margin-right: -4px;
    z-index: 1;
  }
  .tl-item:first-child .tl-dot {
    background: var(--accent);
    box-shadow: 0 0 8px rgba(91,141,238,.5);
  }
  .tl-right {
    flex: 1;
    padding: 0 0 24px 12px;
  }
  .tl-item:last-child .tl-right { padding-bottom: 0; }
  .tl-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    background: rgba(91,141,238,.15);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 7px;
    margin-bottom: 8px;
  }
  .tl-item:not(:first-child) .tl-badge {
    background: var(--surface2);
    color: var(--text-dim);
  }
  .tl-content {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }
  .tl-notes {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
  }

  /* 연관 아이템 */
  .related-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .related-chip {
    font-size: 13px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    color: var(--text-muted);
    transition: border-color .15s, color .15s;
  }
  .related-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .no-related { font-size: 13px; color: var(--text-dim); }

  /* 로딩 / 에러 */
  #load-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 100;
    transition: opacity .3s;
  }
  #load-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #load-msg { font-size: 13px; color: var(--text-muted); }

  #error-banner {
    background: #2a1a1a;
    border: 1px solid #5a2a2a;
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: 13px;
    color: #e08080;
    line-height: 1.6;
    display: none;
  }
  #error-banner.visible { display: block; }
  #error-banner code {
    font-family: var(--font-mono);
    font-size: 12px;
    background: rgba(255,255,255,.06);
    padding: 1px 5px;
    border-radius: 3px;
  }

  /* 반응형 */
  @media (max-width: 680px) {
    #sidebar { width: 220px; }
    #main { padding: 20px 18px; }
    .doc-title { font-size: 20px; }
  }
</style>
</head>
<body>

<!-- 로딩 오버레이 -->
<div id="load-overlay">
  <div class="spinner"></div>
  <div id="load-msg">wiki.json 불러오는 중…</div>
</div>

<!-- 헤더 -->
<div id="header">
  <div class="logo">💡 아이디어 <span>위키</span></div>
  <div id="search-wrap">
    <span class="icon">🔍</span>
    <input id="search" type="text" placeholder="아이템 검색…" autocomplete="off">

</div>

<!-- 본문 -->
<div id="layout">
  <div id="sidebar">
    <div id="sidebar-header">

    <div id="item-list"></div>
  </div>

  <div id="main">
    <div id="error-banner"></div>
    <div id="empty-state">
      <div class="icon">📄</div>
      <p>사이드바에서 아이템을 선택하세요</p>
    </div>

        <div id="doc-tags" class="doc-tags"></div>

      </div>

      <!-- 개요 섹션 -->
      <div class="section">
        <div class="section-header">
          <span class="s-icon">📋</span>
          <span class="s-title">개요</span>
        </div>
        <div class="section-body">
          <div id="doc-summary" class="summary-text"></div>

      </div>

      <!-- 버전 히스토리 섹션 -->
      <div class="section">
        <div class="section-header">
          <span class="s-icon">🕐</span>
          <span class="s-title">버전 히스토리</span>
        </div>
        <div class="section-body">
          <div id="doc-timeline" class="timeline"></div>

      <div class="section" id="related-section">
        <div class="section-header">
          <span class="s-icon">🔗</span>
          <span class="s-title">연관 아이템</span>
        </div>
        <div class="section-body">
          <div id="doc-related" class="related-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── 샘플 데이터 (wiki.json이 없을 때 폴백) ───────────────────

// ── 전역 상태 ─────────────────────────────────────────────────
let wiki = null;
let activeId = null;

// ── wiki.json 로드 ────────────────────────────────────────────
async function loadWiki() {
  // 1) 인라인 데이터가 주입된 경우 (스케줄러가 생성)
  if (typeof WIKI_DATA !== 'undefined') {
    return WIKI_DATA;
  }

  // 2) fetch 시도 (로컬 서버 또는 일부 브라우저 file:// 허용)
  try {
    const resp = await fetch('./wiki.json');
    if (resp.ok) return await resp.json();
  } catch (e) {
    // file:// 프로토콜에서는 fetch가 차단될 수 있음 — 폴백으로 진행
  }

  // 3) 샘플 데이터로 폴백
  return null;
}

// ── 날짜 포맷 ─────────────────────────────────────────────────
function fmtDate(isoStr) {
  if (!isoStr) return '';
  try {
    return new Date(isoStr).toLocaleDateString('ko-KR', {
      year: 'numeric', month: 'long', day: 'numeric'
    });
  } catch { return isoStr; }
}

function fmtWeek(weekStr) {
  if (!weekStr) return '';
  try {
    return new Date(weekStr).toLocaleDateString('ko-KR', {
      year: 'numeric', month: 'short', day: 'numeric'
    }) + ' 주';
  } catch { return weekStr; }
}

// ── 사이드바 렌더링 ───────────────────────────────────────────
function renderSidebar(items) {
  const list = document.getElementById('item-list');
  const countEl = document.getElementById('item-count');

  list.innerHTML = '';
  countEl.textContent = items.length;

  if (items.length === 0) {
    list.innerHTML = '<div style="padding:20px 16px;font-size:13px;color:var(--text-dim)">검색 결과 없음</div>';
    return;
  }

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item-entry' + (item.id === activeId ? ' active' : '');
    div.dataset.id = item.id;

    const latestWeek = item.versions?.[0]?.week || '';
    const tagsHtml = (item.tags || []).slice(0, 3)
      .map(t => `<span class="entry-tag">${esc(t)}</span>`).join('');

    div.innerHTML = `
      <div class="entry-title">${esc(item.title)}</div>
      <div class="entry-meta">
        <span>${latestWeek ? fmtWeek(latestWeek) : ''}</span>
        <div class="entry-tags">${tagsHtml}</div>
      </div>`;
    div.addEventListener('click', () => selectItem(item.id));
    list.appendChild(div);
  });
}

// ── 아이템 선택 ───────────────────────────────────────────────
function selectItem(id) {
  activeId = id;

  // 사이드바 active 상태
  document.querySelectorAll('.item-entry').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  const item = wiki.items.find(i => i.id === id);
  if (!item) return;

  // 빈 상태 숨김
  document.getElementById('empty-state').style.display = 'none';
  const doc = document.getElementById('wiki-doc');
  doc.classList.add('visible');

  // 타이틀
  document.getElementById('doc-title').textContent = item.title;

  // 태그
  const tagsEl = document.getElementById('doc-tags');
  tagsEl.innerHTML = (item.tags || []).map(t => `<span class="doc-tag">${esc(t)}</span>`).join('');

  // 업데이트 날짜
  const latestWeek = item.versions?.[0]?.week;
  document.getElementById('doc-updated').textContent =
    latestWeek ? `마지막 업데이트: ${fmtWeek(latestWeek)}` : '';

  // 개요
  document.getElementById('doc-summary').textContent = item.summary || '—';

  // 타임라인
  const timeline = document.getElementById('doc-timeline');
  if (!item.versions || item.versions.length === 0) {
    timeline.innerHTML = '<div style="font-size:13px;color:var(--text-dim)">버전 기록 없음</div>';
  } else {
    timeline.innerHTML = item.versions.map((v, i) => `
      <div class="tl-item">
        <div class="tl-left">
          <div class="tl-week">${v.week || ''}</div>
          <div class="tl-dot-wrap"><div class="tl-dot"></div></div>
        </div>
        <div class="tl-right">
          <div class="tl-badge">${i === 0 ? '최신' : 'v' + (item.versions.length - i)}</div>
          <div class="tl-content">${esc(v.content || '')}</div>
          ${v.source_note_ids?.length
            ? `<div class="tl-notes">노트 ${v.source_note_ids.length}개 기반</div>`
            : ''}
        </div>
      </div>`).join('');
  }

  // 연관 아이템
  const relatedEl = document.getElementById('doc-related');
  const related = (item.related || [])
    .map(rid => wiki.items.find(i => i.id === rid))
    .filter(Boolean);

  if (related.length === 0) {
    relatedEl.innerHTML = '<span class="no-related">연관 아이템 없음</span>';
  } else {
    relatedEl.innerHTML = related.map(r =>
      `<div class="related-chip" data-id="${r.id}">${esc(r.title)}</div>`
    ).join('');
    relatedEl.querySelectorAll('.related-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        selectItem(chip.dataset.id);
        // 사이드바 스크롤
        const entry = document.querySelector(`.item-entry[data-id="${chip.dataset.id}"]`);
        entry?.scrollIntoView({ block: 'nearest' });
      });
    });
  }

  // 스크롤 맨 위로
  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
}

// ── 검색 ──────────────────────────────────────────────────────
function filterItems(query) {
  if (!wiki) return;
  const q = query.toLowerCase().trim();
  if (!q) {
    renderSidebar(wiki.items);
    return;
  }
  const filtered = wiki.items.filter(item =>
    item.title.toLowerCase().includes(q) ||
    (item.tags || []).some(t => t.toLowerCase().includes(q)) ||
    (item.summary || '').toLowerCase().includes(q)
  );
  renderSidebar(filtered);
}

// ── XSS 방지 ─────────────────────────────────────────────────
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── 에러 표시 ─────────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('error-banner');
  el.innerHTML = msg;
  el.classList.add('visible');
}

// ── 초기화 ────────────────────────────────────────────────────
async function init() {
  const overlay = document.getElementById('load-overlay');
  const metaEl = document.getElementById('meta');

  let data = await loadWiki();
  let usingSample = false;

  if (!data) {
    usingSample = true;
    data = SAMPLE_WIKI;
    showError(
      '⚠️ <b>wiki.json을 찾을 수 없습니다.</b> 샘플 데이터로 표시 중입니다.<br>' +
      '이 파일(<code>viewer/index.html</code>)과 같은 폴더에 <code>wiki.json</code>을 두거나, ' +
      '스케줄러가 생성한 뷰어를 사용하세요.'
    );
  }

  wiki = data;

  // 메타 정보
  const updatedAt = fmtDate(wiki.updated_at);
  const count = wiki.items?.length || 0;
  metaEl.textContent = `${count}개 아이템${updatedAt ? ' · ' + updatedAt : ''}${usingSample ? ' (샘플)' : ''}`;

  renderSidebar(wiki.items || []);

  // 검색 이벤트
  document.getElementById('search').addEventListener('input', e => filterItems(e.target.value));

  // 첫 번째 아이템 자동 선택
  if (wiki.items?.length > 0) {
    selectItem(wiki.items[0].id);
  }

  // 로딩 오버레이 제거
  overlay.classList.add('hidden');
  setTimeout(() => overlay.style.display = 'none', 350);
}

init();
</script>
