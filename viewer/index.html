<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아이디어 위키</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Linux+Libertine:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── 공통 레이아웃 변수 ── */
  :root {
    --sidebar-w: 260px;
    --toc-w: 200px;
    --header-h: 48px;
    --font-serif: 'Linux Libertine', 'Georgia', serif;
    --font-sans: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    --font-mono: 'Courier New', monospace;
  }

  /* ── 테마: 위키피디아 라이트 (기본) ── */
  :root, [data-theme="wiki"] {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --border: #a2a9b1;
    --border-light: #e0e3e7;
    --accent: #3366cc;
    --text: #202122;
    --text-muted: #54595d;
    --text-dim: #72777d;
    --infobox-header: #cee0f2;
    --infobox-border: #a2a9b1;
    --tag-bg: #eaf3fb;
    --tag-fg: #3366cc;
    --tl-line: #a2a9b1;
    --tl-dot: #3366cc;
    --tl-dot-old: #a2a9b1;
    --comment-bg: #fafafa;
    --comment-border: #e0e3e7;
    --error-bg: #fef6e4;
    --error-border: #fc3;
    --graph-bg: #f8f9fa;
    --graph-node-label: #54595d;
    --graph-node-label-hover: #202122;
  }

  /* ── 테마: 다크 모던 ── */
  [data-theme="dark"] {
    --bg: #0e0f11;
    --surface: #16181c;
    --border: #2a2d35;
    --border-light: #2a2d35;
    --accent: #5b8dee;
    --text: #e8eaf0;
    --text-muted: #7a8099;
    --text-dim: #4a5068;
    --infobox-header: #1a2540;
    --infobox-border: #2a2d35;
    --tag-bg: #1a2540;
    --tag-fg: #5b8dee;
    --tl-line: #2a2d35;
    --tl-dot: #5b8dee;
    --tl-dot-old: #2a2d35;
    --comment-bg: #1e2026;
    --comment-border: #2a2d35;
    --error-bg: #2a1a1a;
    --error-border: #5a2a2a;
    --graph-bg: #0e0f11;
    --graph-node-label: #7a8099;
    --graph-node-label-hover: #e8eaf0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── 헤더 ── */
  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: var(--header-h);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-logo {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    text-decoration: none;
  }

  .header-logo em {
    font-style: italic;
    color: var(--accent);
  }

  .header-divider {
    width: 1px;
    height: 20px;
    background: var(--border-light);
    flex-shrink: 0;
  }

  #search-wrap {
    flex: 1;
    max-width: 400px;
    display: flex;
    align-items: center;
    gap: 0;
  }

  #search {
    flex: 1;
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 2px 0 0 2px;
    padding: 5px 10px;
    font-size: 13px;
    font-family: var(--font-sans);
    color: var(--text);
    background: var(--surface);
    outline: none;
  }

  #search:focus { border-color: var(--accent); }

  .search-btn {
    border: 1px solid var(--border);
    border-radius: 0 2px 2px 0;
    background: var(--bg);
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--font-sans);
  }

  #meta-info {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }

  #view-toggle {
    display: flex;
    gap: 2px;
  }

  .toggle-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 4px 10px;
    font-size: 12px;
    font-family: var(--font-sans);
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 2px;
    transition: background .1s;
  }

  .toggle-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ── 전체 레이아웃 ── */
  #layout {
    display: flex;
    min-height: calc(100vh - var(--header-h));
  }

  /* ── 왼쪽 사이드바 (아이템 목록) ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border-light);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: var(--header-h);
    height: calc(100vh - var(--header-h));
    overflow: hidden;
  }

  #sidebar-title {
    padding: 10px 14px 8px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #item-count {
    background: var(--bg);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    text-transform: none;
    letter-spacing: 0;
  }

  #item-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  #item-list::-webkit-scrollbar { width: 4px; }
  #item-list::-webkit-scrollbar-thumb { background: var(--border-light); }

  .item-entry {
    padding: 7px 14px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .1s;
  }

  .item-entry:hover { background: #f0f0f0; }

  .item-entry.active {
    background: #eaf3fb;
    border-left-color: var(--accent);
  }

  .item-entry .entry-title {
    font-size: 13.5px;
    color: var(--accent);
    line-height: 1.35;
    text-decoration: underline;
    text-decoration-color: transparent;
    transition: text-decoration-color .1s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-entry:hover .entry-title { text-decoration-color: var(--accent); }
  .item-entry.active .entry-title { text-decoration-color: var(--accent); }

  .item-entry .entry-week {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 1px;
  }

  /* ── 메인 콘텐츠 ── */
  #main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    padding: 24px 20px;
  }

  #article-wrap {
    width: 100%;
    max-width: 860px;
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  /* ── 위키 문서 본문 ── */
  #wiki-doc {
    flex: 1;
    min-width: 0;
    display: none;
  }

  #wiki-doc.visible { display: block; }

  /* 문서 제목 */
  .doc-title {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 600;
    line-height: 1.25;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    margin-bottom: 12px;
    color: var(--text);
  }

  .doc-subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .doc-subtitle .sep { color: var(--border); }

  /* 태그 */
  .doc-tag {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--tag-fg);
    border: 1px solid #c8d8f0;
    border-radius: 2px;
    padding: 0px 6px;
    font-size: 11px;
    text-decoration: none;
    cursor: default;
  }

  /* 인포박스 (위키피디아 우측 박스) */
  .infobox {
    float: right;
    clear: right;
    margin: 0 0 16px 24px;
    min-width: 220px;
    max-width: 280px;
    border: 1px solid var(--infobox-border);
    border-collapse: collapse;
    font-size: 13px;
    background: var(--surface);
  }

  .infobox-header {
    background: var(--infobox-header);
    border-bottom: 1px solid var(--infobox-border);
    padding: 6px 10px;
    font-weight: 500;
    font-size: 13px;
    text-align: center;
    color: var(--text);
  }

  .infobox-body { padding: 8px 10px; }

  .infobox-row {
    display: flex;
    gap: 6px;
    padding: 3px 0;
    border-bottom: 1px solid var(--border-light);
    font-size: 12.5px;
  }

  .infobox-row:last-child { border-bottom: none; }

  .infobox-label {
    color: var(--text-muted);
    min-width: 64px;
    flex-shrink: 0;
    font-weight: 500;
  }

  .infobox-val { color: var(--text); }

  .infobox-tags { display: flex; flex-wrap: wrap; gap: 4px; }

  /* 섹션 헤딩 */
  .wiki-h2 {
    font-family: var(--font-serif);
    font-size: 19px;
    font-weight: 600;
    border-bottom: 1px solid var(--border-light);
    padding-bottom: 3px;
    margin: 20px 0 10px;
    color: var(--text);
  }

  .wiki-h3 {
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 600;
    margin: 14px 0 6px;
    color: var(--text);
  }

  /* 개요 텍스트 */
  .summary-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 16px;
  }

  /* 타임라인 */
  .timeline { position: relative; padding-left: 0; }

  .tl-item {
    display: flex;
    gap: 0;
    position: relative;
    margin-bottom: 0;
  }

  .tl-gutter {
    width: 80px;
    flex-shrink: 0;
    padding-right: 16px;
    padding-top: 3px;
    text-align: right;
    position: relative;
  }

  .tl-gutter::after {
    content: '';
    position: absolute;
    right: -1px;
    top: 10px;
    bottom: -10px;
    width: 1px;
    background: var(--tl-line);
  }

  .tl-item:last-child .tl-gutter::after { display: none; }

  .tl-date {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    line-height: 1.3;
  }

  .tl-connector {
    width: 24px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 6px;
    position: relative;
  }

  .tl-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--surface);
    background: var(--tl-dot-old);
    flex-shrink: 0;
    z-index: 1;
  }

  .tl-item:first-child .tl-dot {
    background: var(--tl-dot);
    width: 12px;
    height: 12px;
  }

  .tl-connector::after {
    content: '';
    position: absolute;
    top: 18px;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    background: var(--tl-line);
  }

  .tl-item:last-child .tl-connector::after { display: none; }

  .tl-body {
    flex: 1;
    padding: 0 0 18px 12px;
  }

  .tl-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    background: var(--infobox-header);
    color: var(--text-muted);
    border: 1px solid var(--border-light);
    border-radius: 2px;
    padding: 1px 6px;
    margin-bottom: 5px;
  }

  .tl-item:first-child .tl-badge {
    background: #dce9f8;
    color: var(--accent);
    border-color: #c8d8f0;
  }

  .tl-content {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
  }

  .tl-sources {
    margin-top: 4px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* 연관 아이템 */
  .related-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .related-link {
    color: var(--accent);
    font-size: 13px;
    text-decoration: underline;
    cursor: pointer;
    padding: 2px 0;
  }

  .related-link:hover { color: #2a55aa; }

  .no-content {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* 코멘트 */
  .comment-item {
    border-left: 3px solid var(--border-light);
    padding: 6px 12px;
    margin-bottom: 10px;
    background: var(--comment-bg);
  }

  .comment-date {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    margin-bottom: 3px;
  }

  .comment-text {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* 목차 (TOC) */
  #toc {
    width: var(--toc-w);
    flex-shrink: 0;
    position: sticky;
    top: calc(var(--header-h) + 24px);
    align-self: flex-start;
    font-size: 12.5px;
    display: none;
  }

  #toc.visible { display: block; }

  .toc-box {
    border: 1px solid var(--border-light);
    background: var(--surface);
    padding: 10px 12px;
  }

  .toc-title {
    font-weight: 500;
    font-size: 12px;
    margin-bottom: 6px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .toc-list { list-style: none; }

  .toc-item {
    padding: 2px 0;
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
    font-size: 12.5px;
  }

  .toc-item:hover { color: #2a55aa; }

  /* 빈 상태 */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 80px 20px;
    color: var(--text-dim);
    font-style: italic;
    font-family: var(--font-serif);
    font-size: 16px;
  }

  /* 에러 */
  #error-banner {
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-left: 4px solid var(--error-border);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 16px;
    display: none;
    line-height: 1.6;
  }

  #error-banner.visible { display: block; }

  /* 그래프 뷰 */
  #graph-view {
    display: none;
    flex: 1;
    position: relative;
    background: var(--bg);
  }

  #graph-view.visible { display: block; }

  #graph-canvas {
    width: 100%;
    height: calc(100vh - var(--header-h));
    display: block;
    cursor: grab;
  }

  #graph-canvas:active { cursor: grabbing; }

  #graph-tooltip {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text);
    pointer-events: none;
    opacity: 0;
    transition: opacity .12s;
    max-width: 180px;
    line-height: 1.4;
    z-index: 10;
    box-shadow: 1px 2px 4px rgba(0,0,0,.12);
  }

  #graph-tooltip.visible { opacity: 1; }

  #graph-controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .gc-btn {
    width: 28px;
    height: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-sans);
  }

  .gc-btn:hover { background: var(--bg); color: var(--accent); }

  /* 로딩 */
  #load-overlay {
    position: fixed; inset: 0;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    z-index: 200;
    transition: opacity .3s;
  }

  #load-overlay.hidden { opacity: 0; pointer-events: none; }

  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border-light);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #load-msg {
    font-size: 13px;
    color: var(--text-dim);
    font-family: var(--font-serif);
    font-style: italic;
  }

  /* clearfix */
  .clearfix::after { content: ''; display: table; clear: both; }

  @media (max-width: 900px) {
    #toc { display: none !important; }
    .infobox { max-width: 220px; min-width: 180px; }
  }

  @media (max-width: 640px) {
    #sidebar { width: 200px; }
    .infobox { float: none; max-width: 100%; margin: 0 0 16px 0; }
  }
</style>
</head>
<body>

<div id="load-overlay">
  <div class="spinner"></div>
  <div id="load-msg">위키 데이터를 불러오는 중…</div>
</div>

<div id="header">
  <a class="header-logo" href="#" onclick="return false">💡 <em>아이디어</em> 위키</a>
  <div class="header-divider"></div>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="아이템 검색…" autocomplete="off">
    <button class="search-btn">검색</button>
  </div>
  <div id="view-toggle">
    <button class="toggle-btn active" id="btn-wiki" onclick="switchView('wiki')">위키</button>
    <button class="toggle-btn" id="btn-graph" onclick="switchView('graph')">그래프</button>
  </div>
  <button id="theme-toggle" onclick="toggleTheme()" title="테마 변경" style="
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    padding: 4px 10px;
    font-size: 12px;
    font-family: var(--font-sans);
    cursor: pointer;
    border-radius: 2px;
    white-space: nowrap;
    transition: background .1s, color .1s;
  ">🌙 다크</button>
  <div id="meta-info">—</div>
</div>

<div id="layout">
  <!-- 왼쪽 사이드바 -->
  <div id="sidebar">
    <div id="sidebar-title">
      아이템 <span id="item-count">0</span>
    </div>
    <div id="item-list"></div>
  </div>

  <!-- 그래프 뷰 -->
  <div id="graph-view">
    <canvas id="graph-canvas"></canvas>
    <div id="graph-tooltip"></div>
    <div id="graph-controls">
      <button class="gc-btn" id="gc-zoom-in" title="확대">+</button>
      <button class="gc-btn" id="gc-zoom-out" title="축소">−</button>
      <button class="gc-btn" id="gc-reset" title="초기화">⌂</button>
    </div>
  </div>

  <!-- 메인 -->
  <div id="main">
    <div id="article-wrap">
      <!-- 위키 문서 -->
      <div id="wiki-doc">
        <div id="error-banner"></div>
        <div id="doc-content"></div>
      </div>

      <!-- 빈 상태 -->
      <div id="empty-state">
        <div>← 왼쪽에서 아이템을 선택하세요</div>
      </div>

      <!-- 목차 -->
      <div id="toc">
        <div class="toc-box">
          <div class="toc-title">목차</div>
          <ul class="toc-list" id="toc-list"></ul>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SAMPLE_WIKI = {
  "schema_version": "1",
  "updated_at": "2026-05-26T09:00:00+00:00",
  "last_processed_at": "2026-05-26T09:00:00+00:00",
  "items": [
    {
      "id": "item_demo01",
      "title": "AI 기반 루틴 코치 앱",
      "tags": ["앱", "AI", "헬스"],
      "summary": "사용자의 일일 루틴을 분석해 AI가 맞춤형 피드백과 개선 제안을 제공하는 모바일 앱. 수면, 운동, 식사 패턴을 종합적으로 파악해 최적의 루틴을 설계해준다.",
      "versions": [

        { "week": "2026-05-18", "content": "기본 아이디어 정리. 사용자가 매일 간단한 체크인만 하면 AI가 패턴을 학습해 점진적으로 더 나은 루틴을 제안.", "source_note_ids": [] }
      ],
      "related": ["item_demo02", "item_demo03"],
      "comments": [{ "date": "2026-05-27", "text": "수면 트래킹은 워치 연동으로 자동화하는 게 더 좋을 것 같다.", "attachments": [] }]
    },

      "versions": [
        { "week": "2026-05-25", "content": "은행 API 연동으로 구독 결제 내역을 자동 감지하는 방식 검토.", "source_note_ids": [] }
      ],
      "related": ["item_demo01"],
      "comments": []

let wiki = null;
let activeId = null;

async function loadWiki() {
  if (typeof WIKI_DATA !== 'undefined') return WIKI_DATA;
  try {
    const resp = await fetch('./wiki.json');
    if (resp.ok) return await resp.json();
  } catch(e) {}
  return null;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' }); }
  catch { return iso; }
}

function fmtWeek(w) {
  if (!w) return '';
  try { return new Date(w).toLocaleDateString('ko-KR', { year:'numeric', month:'short', day:'numeric' }); }
  catch { return w; }
}

function renderSidebar(items) {
  const list = document.getElementById('item-list');
  document.getElementById('item-count').textContent = items.length;
  if (!items.length) {
    list.innerHTML = '<div style="padding:14px;font-size:13px;color:var(--text-dim);font-style:italic">결과 없음</div>';
    return;
  }
  list.innerHTML = items.map(item => {
    const week = item.versions?.[0]?.week || '';
    return `<div class="item-entry${item.id === activeId ? ' active' : ''}" data-id="${esc(item.id)}">
      <div class="entry-title">${esc(item.title)}</div>
      ${week ? `<div class="entry-week">${fmtWeek(week)}</div>` : ''}
    </div>`;
  }).join('');
  list.querySelectorAll('.item-entry').forEach(el =>
    el.addEventListener('click', () => selectItem(el.dataset.id))
  );
}

function selectItem(id) {
  activeId = id;
  document.querySelectorAll('.item-entry').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id)
  );

  const item = wiki.items.find(i => i.id === id);
  if (!item) return;

  document.getElementById('empty-state').style.display = 'none';
  const doc = document.getElementById('wiki-doc');
  doc.classList.add('visible');

  const latestWeek = item.versions?.[0]?.week;
  const tagsHtml = (item.tags||[]).map(t => `<span class="doc-tag">${esc(t)}</span>`).join(' ');

  const relatedItems = (item.related||[]).map(rid => wiki.items.find(i=>i.id===rid)).filter(Boolean);

  const versionsHtml = !item.versions?.length
    ? '<p class="no-content">버전 기록 없음</p>'
    : item.versions.map((v, i) => `
        <div class="tl-item">
          <div class="tl-gutter"><div class="tl-date">${v.week||''}</div></div>
          <div class="tl-connector"><div class="tl-dot"></div></div>
          <div class="tl-body">
            <div class="tl-badge">${i===0 ? '최신' : fmtWeek(v.week)}</div>
            <div class="tl-content">${esc(v.content||'')}</div>
            ${v.source_note_ids?.length ? `<div class="tl-sources">노트 ${v.source_note_ids.length}개 기반</div>` : ''}
          </div>
        </div>`).join('');

  const relatedHtml = !relatedItems.length
    ? '<p class="no-content">연관 아이템 없음</p>'
    : `<div class="related-list">${relatedItems.map(r =>
        `<span class="related-link" data-id="${r.id}">${esc(r.title)}</span>`
      ).join('<span style="color:var(--border);margin:0 2px"> · </span>')}</div>`;

  const comments = (item.comments||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const commentsHtml = !comments.length ? '' : `
    <h2 class="wiki-h2" id="sec-comments">코멘트</h2>
    ${comments.map(c => `
      <div class="comment-item">
        <div class="comment-date">${esc(c.date)}</div>
        <div class="comment-text">${esc(c.text||'')}</div>
      </div>`).join('')}`;

  const hasAttachments = item.attachments?.length > 0;
  const attachmentsHtml = !hasAttachments ? '' : `
    <h2 class="wiki-h2" id="sec-attachments">이미지 첨부</h2>
    ${item.attachments.map(att => {
      const picUrl = att.pic_drive_id
        ? `https://lh3.googleusercontent.com/d/${att.pic_drive_id}`
        : null;
      const imgHtml = picUrl
        ? `<img src="${picUrl}" alt="${esc(att.description || att.summary || '')}"
            style="width:120px;height:90px;object-fit:cover;border:1px solid var(--border-light);flex-shrink:0;cursor:pointer"
            onclick="window.open('https://drive.google.com/file/d/${att.pic_drive_id}/view','_blank')"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
           /><div style="display:none;width:120px;height:90px;background:var(--bg);border:1px solid var(--border-light);align-items:center;justify-content:center;font-size:28px;flex-shrink:0">🖼️</div>`
        : `<div style="width:120px;height:90px;background:var(--bg);border:1px solid var(--border-light);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">🖼️</div>`;
      const descText = att.description ? `<div style="font-size:12.5px;color:var(--text-muted);margin-bottom:4px;font-style:italic">${esc(att.description)}</div>` : '';
      return `
      <div style="border:1px solid var(--border-light);padding:10px;margin-bottom:10px;display:flex;gap:12px;background:var(--surface)">
        ${imgHtml}
        <div>
          <div style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono);margin-bottom:4px">${esc(att.filename||'')}</div>
          <div style="font-size:13.5px;font-weight:500;margin-bottom:6px">${esc(att.summary||'')}</div>
          ${descText}
          ${att.ocr_text ? `<div style="font-size:12.5px;color:var(--text-muted);white-space:pre-wrap">${esc(att.ocr_text)}</div>` : ''}
        </div>
      </div>`;
    }).join('')}`;

  const tocItems = [
    { id: 'sec-summary', label: '개요' },
    { id: 'sec-history', label: '버전 히스토리' },
    ...(hasAttachments ? [{ id: 'sec-attachments', label: '이미지 첨부' }] : []),
    ...(comments.length ? [{ id: 'sec-comments', label: '코멘트' }] : []),
    { id: 'sec-related', label: '연관 아이템' },
  ];

  document.getElementById('toc-list').innerHTML = tocItems.map(t =>
    `<li class="toc-item" onclick="document.getElementById('${t.id}')?.scrollIntoView({behavior:'smooth'})">${t.label}</li>`
  ).join('');
  document.getElementById('toc').classList.add('visible');

  document.getElementById('doc-content').innerHTML = `
    <h1 class="doc-title">${esc(item.title)}</h1>
    <div class="doc-subtitle">
      ${latestWeek ? `<span>마지막 수정: ${fmtWeek(latestWeek)}</span><span class="sep">|</span>` : ''}
      <span>버전 ${item.versions?.length||0}개</span>
      ${tagsHtml ? `<span class="sep">|</span>${tagsHtml}` : ''}
    </div>
    <div class="clearfix">
      <div class="infobox">
        <div class="infobox-header">아이디어 요약</div>
        <div class="infobox-body">
          <div class="infobox-row">
            <div class="infobox-label">분류</div>
            <div class="infobox-val infobox-tags">${(item.tags||[]).map(t=>`<span class="doc-tag">${esc(t)}</span>`).join(' ')}</div>
          </div>
          <div class="infobox-row">
            <div class="infobox-label">버전 수</div>
            <div class="infobox-val">${item.versions?.length||0}개</div>
          </div>
          ${latestWeek ? `<div class="infobox-row">
            <div class="infobox-label">최신</div>
            <div class="infobox-val">${fmtWeek(latestWeek)}</div>
          </div>` : ''}
          ${relatedItems.length ? `<div class="infobox-row">
            <div class="infobox-label">연관</div>
            <div class="infobox-val">${relatedItems.map(r=>`<span class="related-link" data-id="${r.id}" style="font-size:12px">${esc(r.title)}</span>`).join(', ')}</div>
          </div>` : ''}
        </div>
      </div>

      <h2 class="wiki-h2" id="sec-summary">개요</h2>
      <p class="summary-text">${esc(item.summary||'개요 없음')}</p>
    </div>

    <h2 class="wiki-h2" id="sec-history">버전 히스토리</h2>
    <div class="timeline">${versionsHtml}</div>

    ${attachmentsHtml}
    ${commentsHtml}

    <h2 class="wiki-h2" id="sec-related">연관 아이템</h2>
    ${relatedHtml}
  `;

  doc.querySelectorAll('.related-link').forEach(el =>
    el.addEventListener('click', () => {
      selectItem(el.dataset.id);
      document.querySelector(`.item-entry[data-id="${el.dataset.id}"]`)?.scrollIntoView({ block:'nearest' });
    })
  );

  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
}

function filterItems(q) {
  if (!wiki) return;
  const query = q.toLowerCase().trim();
  if (!query) { renderSidebar(wiki.items); return; }
  renderSidebar(wiki.items.filter(item =>
    item.title.toLowerCase().includes(query) ||
    (item.tags||[]).some(t => t.toLowerCase().includes(query)) ||
    (item.summary||'').toLowerCase().includes(query)
  ));
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.innerHTML = msg;
  el.classList.add('visible');
}

let currentView = 'wiki';
let graphState = null;

function switchView(view) {
  currentView = view;
  const graphPanel = document.getElementById('graph-view');
  const mainPanel = document.getElementById('main');
  const btnWiki = document.getElementById('btn-wiki');
  const btnGraph = document.getElementById('btn-graph');

  if (view === 'graph') {
    mainPanel.style.display = 'none';
    graphPanel.classList.add('visible');
    btnGraph.classList.add('active');
    btnWiki.classList.remove('active');
    if (wiki) renderGraph(wiki.items||[]);
  } else {
    mainPanel.style.display = '';
    graphPanel.classList.remove('visible');
    btnWiki.classList.add('active');
    btnGraph.classList.remove('active');
  }
}

const TAG_COLORS = ['#3366cc','#cc3333','#339933','#cc6600','#663399','#006666','#993366','#336699'];

function renderGraph(items) {
  const canvas = document.getElementById('graph-canvas');
  const tooltip = document.getElementById('graph-tooltip');
  const parent = document.getElementById('graph-view');
  const ctx = canvas.getContext('2d');

  const dpr = window.devicePixelRatio||1;
  const W = parent.clientWidth;
  const H = parent.clientHeight;
  canvas.width = W*dpr; canvas.height = H*dpr;
  ctx.scale(dpr, dpr);

  const allTags = [...new Set(items.flatMap(i=>i.tags||[]))];
  const tagColor = {};
  allTags.forEach((t,i) => { tagColor[t] = TAG_COLORS[i%TAG_COLORS.length]; });

  const nodeMap = {};
  items.forEach(item => { nodeMap[item.id] = item; });

  const nodes = items.map((item, i) => {
    const angle = 2*Math.PI*i/items.length;
    const r = Math.min(W,H)*0.3;
    return {
      id: item.id, title: item.title, tags: item.tags||[],
      color: tagColor[(item.tags||[])[0]]||'#3366cc',
      x: W/2+r*Math.cos(angle)+(Math.random()-.5)*30,
      y: H/2+r*Math.sin(angle)+(Math.random()-.5)*30,
      vx:0, vy:0, radius:10
    };
  });

  const edges = [], seen = new Set();
  items.forEach(item => {
    (item.related||[]).forEach(rid => {
      const key = [item.id,rid].sort().join('--');
      if (seen.has(key)||!nodeMap[rid]) return;
      seen.add(key);
      const explicit = (item.explicit_related||[]).includes(rid);
      edges.push({ from:item.id, to:rid, explicit });
    });
  });

  const nodeIdx = {};
  nodes.forEach((n,i) => { nodeIdx[n.id]=i; });

  let transform = {x:0,y:0,scale:1};
  let dragging=null, panning=null, hoveredNode=null;
  let simRunning=true, frameCnt=0, animFrame=null;

  function tick() {
    const repulse=4000, linkDist=130, linkStr=0.04, alpha=0.08, centerStr=0.012;
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++) {
      const a=nodes[i],b=nodes[j];
      let dx=b.x-a.x, dy=b.y-a.y;
      const d2=dx*dx+dy*dy+.01, f=repulse/d2, d=Math.sqrt(d2);
      a.vx-=f*dx/d; a.vy-=f*dy/d; b.vx+=f*dx/d; b.vy+=f*dy/d;
    }
    edges.forEach(e => {
      const a=nodes[nodeIdx[e.from]], b=nodes[nodeIdx[e.to]];
      if(!a||!b) return;
      let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      const f=(d-linkDist)*linkStr;
      a.vx+=f*dx/d; a.vy+=f*dy/d; b.vx-=f*dx/d; b.vy-=f*dy/d;
    });
    nodes.forEach(n => { n.vx+=(W/2-n.x)*centerStr; n.vy+=(H/2-n.y)*centerStr; });
    nodes.forEach(n => {
      if(dragging&&dragging.node===n) return;
      n.vx*=(1-alpha); n.vy*=(1-alpha);
      n.x+=n.vx; n.y+=n.vy;
    });
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.save();
    ctx.translate(transform.x,transform.y);
    ctx.scale(transform.scale,transform.scale);

    edges.forEach(e => {
      const a=nodes[nodeIdx[e.from]], b=nodes[nodeIdx[e.to]];
      if(!a||!b) return;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle = e.explicit ? 'rgba(51,102,204,0.6)' : 'rgba(162,169,177,0.5)';
      ctx.lineWidth = e.explicit ? 2.5 : 1.5;
      ctx.stroke();
    });

    nodes.forEach(n => {
      const isHov = hoveredNode===n;
      const r = isHov ? n.radius+3 : n.radius;
      ctx.beginPath(); ctx.arc(n.x,n.y,r,0,2*Math.PI);
      ctx.fillStyle = isHov ? n.color : n.color+'cc';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.font = `${isHov?12:11}px "Noto Sans KR", sans-serif`;
      ctx.fillStyle = isHov ? getComputedStyle(document.documentElement).getPropertyValue('--graph-node-label-hover').trim() : getComputedStyle(document.documentElement).getPropertyValue('--graph-node-label').trim();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      let label = n.title;
      const maxW = 85;
      if(ctx.measureText(label).width>maxW) {
        while(label.length>2&&ctx.measureText(label+'…').width>maxW) label=label.slice(0,-1);
        label+='…';
      }
      ctx.fillText(label, n.x, n.y+r+4);
    });
    ctx.restore();
  }

  function loop() {
    if(simRunning){tick();frameCnt++;if(frameCnt>300)simRunning=false;}
    draw();
    animFrame=requestAnimationFrame(loop);
  }

  if(graphState?.animFrame) cancelAnimationFrame(graphState.animFrame);
  graphState = {animFrame:null};

  function canvasPos(e) {
    const rect=canvas.getBoundingClientRect();
    return {x:(e.clientX-rect.left-transform.x)/transform.scale, y:(e.clientY-rect.top-transform.y)/transform.scale};
  }

  function hitNode(cx,cy) {
    for(let i=nodes.length-1;i>=0;i--) {
      const n=nodes[i], dx=cx-n.x, dy=cy-n.y;
      if(dx*dx+dy*dy<=(n.radius+6)**2) return n;
    }
    return null;
  }

  canvas.onmousedown = e => {
    const {x,y}=canvasPos(e), hit=hitNode(x,y);
    if(hit) { dragging={node:hit,ox:x-hit.x,oy:y-hit.y}; simRunning=true; frameCnt=0; }
    else panning={sx:e.clientX,sy:e.clientY,tx:transform.x,ty:transform.y};
  };

  canvas.onmousemove = e => {
    if(dragging){const{x,y}=canvasPos(e);dragging.node.x=x-dragging.ox;dragging.node.y=y-dragging.oy;return;}
    if(panning){transform.x=panning.tx+(e.clientX-panning.sx);transform.y=panning.ty+(e.clientY-panning.sy);return;}
    const{x,y}=canvasPos(e),hit=hitNode(x,y),prev=hoveredNode;
    hoveredNode=hit;
    if(hit!==prev){simRunning=true;frameCnt=0;}
    if(hit){
      const rect=canvas.getBoundingClientRect();
      tooltip.style.left=(e.clientX-rect.left+14)+'px';
      tooltip.style.top=(e.clientY-rect.top-10)+'px';
      tooltip.innerHTML=`<b>${esc(hit.title)}</b>${hit.tags.length?'<br><span style="color:#3366cc;font-size:10px">'+hit.tags.map(t=>'#'+esc(t)).join(' ')+'</span>':''}`;
      tooltip.classList.add('visible');
      canvas.style.cursor='pointer';
    } else { tooltip.classList.remove('visible'); canvas.style.cursor='grab'; }
  };

  canvas.onmouseup = () => { dragging=null; panning=null; };

  canvas.onclick = e => {
    const{x,y}=canvasPos(e),hit=hitNode(x,y);
    if(hit){switchView('wiki');selectItem(hit.id);document.querySelector(`.item-entry[data-id="${hit.id}"]`)?.scrollIntoView({block:'nearest'});}
  };

  canvas.onwheel = e => {
    e.preventDefault();
    const rect=canvas.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const delta=e.deltaY>0?.85:1.18, ns=Math.max(.2,Math.min(4,transform.scale*delta));
    transform.x=mx-(mx-transform.x)*(ns/transform.scale);
    transform.y=my-(my-transform.y)*(ns/transform.scale);
    transform.scale=ns;
  };

  document.getElementById('gc-zoom-in').onclick=()=>{transform.scale=Math.min(4,transform.scale*1.25);simRunning=true;frameCnt=0;};
  document.getElementById('gc-zoom-out').onclick=()=>{transform.scale=Math.max(.2,transform.scale*.8);simRunning=true;frameCnt=0;};
  document.getElementById('gc-reset').onclick=()=>{transform={x:0,y:0,scale:1};simRunning=true;frameCnt=0;};

  animFrame=requestAnimationFrame(loop);
  graphState.animFrame=animFrame;
}

// ── 테마 전환 ─────────────────────────────────────────────────
const THEMES = [
  { key: 'wiki', label: '🌙 다크', next: 'dark' },
  { key: 'dark', label: '☀️ 라이트', next: 'wiki' },
];

function applyTheme(key) {
  document.documentElement.setAttribute('data-theme', key);
  const t = THEMES.find(t => t.key === key) || THEMES[0];
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = t.label;
  try { localStorage.setItem('wiki-theme', key); } catch(e) {}
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'wiki';
  const t = THEMES.find(t => t.key === current) || THEMES[0];
  applyTheme(t.next);
}

async function init() {
  // 저장된 테마 복원
  try {
    const saved = localStorage.getItem('wiki-theme');
    if (saved) applyTheme(saved);
  } catch(e) {}

  const overlay = document.getElementById('load-overlay');
  let data = await loadWiki();
  let usingSample = false;

  if (!data) {
    usingSample = true;
    data = SAMPLE_WIKI;
    showError('⚠️ <b>wiki.json을 찾을 수 없습니다.</b> 샘플 데이터로 표시 중입니다.');
  }

  wiki = data;

  const count = wiki.items?.length||0;
  const updatedAt = fmtDate(wiki.updated_at);
  document.getElementById('meta-info').textContent =
    `아이템 ${count}개${updatedAt?' · '+updatedAt:''}${usingSample?' (샘플)':''}`;

  renderSidebar(wiki.items||[]);
  document.getElementById('search').addEventListener('input', e => filterItems(e.target.value));

  if (wiki.items?.length>0) selectItem(wiki.items[0].id);

  overlay.classList.add('hidden');
  setTimeout(()=>overlay.style.display='none', 350);
}

init();
