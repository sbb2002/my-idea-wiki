<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>아이디어 위키</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Linux+Libertine:ital,wght@0,400;0,600;1,400&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ── 공통 레이아웃 변수 ── */
  :root {
    --sidebar-w: 260px;
    --toc-w: 200px;
    --header-h: 48px;
    --bottom-bar-h: 56px;
    --font-serif: 'Linux Libertine', 'Georgia', serif;
    --font-sans: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    --font-mono: 'Courier New', monospace;
  }

  /* ── 테마: 위키피디아 라이트 (기본) ── */
  :root, [data-theme="wiki"] {
    --bg: #f8f9fa;
    --surface: #ffffff;
    --border: #a2a9b1;
    --border-light: #e0e3e7;
    --accent: #3366cc;
    --text: #202122;
    --text-muted: #54595d;
    --text-dim: #72777d;
    --infobox-header: #cee0f2;
    --infobox-border: #a2a9b1;
    --tag-bg: #eaf3fb;
    --tag-fg: #3366cc;
    --tl-line: #a2a9b1;
    --tl-dot: #3366cc;
    --tl-dot-old: #a2a9b1;
    --comment-bg: #fafafa;
    --comment-border: #e0e3e7;
    --error-bg: #fef6e4;
    --error-border: #fc3;
    --graph-bg: #f8f9fa;
    --graph-node-label: #54595d;
    --graph-node-label-hover: #202122;
    --bottom-bar-bg: #ffffff;
    --bottom-bar-active: #3366cc;
  }

  /* ── 테마: 다크 모던 ── */
  [data-theme="dark"] {
    --bg: #0e0f11;
    --surface: #16181c;
    --border: #2a2d35;
    --border-light: #2a2d35;
    --accent: #5b8dee;
    --text: #e8eaf0;
    --text-muted: #7a8099;
    --text-dim: #4a5068;
    --infobox-header: #1a2540;
    --infobox-border: #2a2d35;
    --tag-bg: #1a2540;
    --tag-fg: #5b8dee;
    --tl-line: #2a2d35;
    --tl-dot: #5b8dee;
    --tl-dot-old: #2a2d35;
    --comment-bg: #1e2026;
    --comment-border: #2a2d35;
    --error-bg: #2a1a1a;
    --error-border: #5a2a2a;
    --graph-bg: #0e0f11;
    --graph-node-label: #7a8099;
    --graph-node-label-hover: #e8eaf0;
    --bottom-bar-bg: #16181c;
    --bottom-bar-active: #5b8dee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ── 헤더 ── */
  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: var(--header-h);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  /* 모바일 햄버거 버튼 */
  #hamburger {
    display: none;
    border: none;
    background: none;
    cursor: pointer;
    padding: 4px;
    color: var(--text-muted);
    flex-shrink: 0;
    line-height: 1;
    font-size: 22px;
  }

  .header-logo {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    text-decoration: none;
    flex-shrink: 0;
  }

  .header-logo em {
    font-style: italic;
    color: var(--accent);
  }

  .header-divider {
    width: 1px;
    height: 20px;
    background: var(--border-light);
    flex-shrink: 0;
  }

  #search-wrap {
    flex: 1;
    max-width: 400px;
    display: flex;
    align-items: center;
    gap: 0;
  }

  #search {
    flex: 1;
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 2px 0 0 2px;
    padding: 5px 10px;
    font-size: 13px;
    font-family: var(--font-sans);
    color: var(--text);
    background: var(--surface);
    outline: none;
    min-width: 0;
  }

  #search:focus { border-color: var(--accent); }

  .search-btn {
    border: 1px solid var(--border);
    border-radius: 0 2px 2px 0;
    background: var(--bg);
    padding: 5px 10px;
    font-size: 12px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: var(--font-sans);
    flex-shrink: 0;
    white-space: nowrap;
  }

  #meta-info {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  #view-toggle {
    display: flex;
    gap: 2px;
    flex-shrink: 0;
  }

  .toggle-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    padding: 4px 10px;
    font-size: 12px;
    font-family: var(--font-sans);
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 2px;
    transition: background .1s;
    white-space: nowrap;
  }

  .toggle-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ── 전체 레이아웃 ── */
  #layout {
    display: flex;
    min-height: calc(100vh - var(--header-h));
  }

  /* ── 왼쪽 사이드바 (아이템 목록) ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border-light);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: var(--header-h);
    height: calc(100vh - var(--header-h));
    overflow: hidden;
    transition: transform .25s cubic-bezier(.4,0,.2,1);
    z-index: 80;
  }

  /* 모바일 오버레이 드로어 */
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 79;
    opacity: 0;
    transition: opacity .25s;
  }

  #sidebar-title {
    padding: 10px 14px 8px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #item-count {
    background: var(--bg);
    border: 1px solid var(--border-light);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    text-transform: none;
    letter-spacing: 0;
  }

  #item-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
    -webkit-overflow-scrolling: touch;
  }

  #item-list::-webkit-scrollbar { width: 4px; }
  #item-list::-webkit-scrollbar-thumb { background: var(--border-light); }

  .item-entry {
    padding: 7px 14px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .1s;
  }

  .item-entry:hover { background: #f0f0f0; }

  .item-entry.active {
    background: #eaf3fb;
    border-left-color: var(--accent);
  }

  [data-theme="dark"] .item-entry:hover { background: #1e2026; }
  [data-theme="dark"] .item-entry.active { background: #1a2540; }

  .item-entry .entry-title {
    font-size: 13.5px;
    color: var(--accent);
    line-height: 1.35;
    text-decoration: underline;
    text-decoration-color: transparent;
    transition: text-decoration-color .1s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .item-entry:hover .entry-title { text-decoration-color: var(--accent); }
  .item-entry.active .entry-title { text-decoration-color: var(--accent); }

  .item-entry .entry-week {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 1px;
  }

  /* ── 메인 콘텐츠 ── */
  #main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    justify-content: center;
    padding: 24px 20px;
    -webkit-overflow-scrolling: touch;
  }

  #article-wrap {
    width: 100%;
    max-width: 860px;
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  /* ── 위키 문서 본문 ── */
  #wiki-doc {
    flex: 1;
    min-width: 0;
    display: none;
  }

  #wiki-doc.visible { display: block; }

  /* 문서 제목 */
  .doc-title {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 600;
    line-height: 1.25;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    margin-bottom: 12px;
    color: var(--text);
  }

  .doc-subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .doc-subtitle .sep { color: var(--border); }

  /* 태그 */
  .doc-tag {
    display: inline-block;
    background: var(--tag-bg);
    color: var(--tag-fg);
    border: 1px solid #c8d8f0;
    border-radius: 2px;
    padding: 0px 6px;
    font-size: 11px;
    text-decoration: none;
    cursor: default;
  }

  /* 인포박스 */
  .infobox {
    float: right;
    clear: right;
    margin: 0 0 16px 24px;
    min-width: 220px;
    max-width: 280px;
    border: 1px solid var(--infobox-border);
    border-collapse: collapse;
    font-size: 13px;
    background: var(--surface);
  }

  .infobox-header {
    background: var(--infobox-header);
    border-bottom: 1px solid var(--infobox-border);
    padding: 6px 10px;
    font-weight: 500;
    font-size: 13px;
    text-align: center;
    color: var(--text);
  }

  .infobox-body { padding: 8px 10px; }

  .infobox-row {
    display: flex;
    gap: 6px;
    padding: 3px 0;
    border-bottom: 1px solid var(--border-light);
    font-size: 12.5px;
  }

  .infobox-row:last-child { border-bottom: none; }

  .infobox-label {
    color: var(--text-muted);
    min-width: 64px;
    flex-shrink: 0;
    font-weight: 500;
  }

  .infobox-val { color: var(--text); }

  .infobox-tags { display: flex; flex-wrap: wrap; gap: 4px; }

  /* 섹션 헤딩 */
  .wiki-h2 {
    font-family: var(--font-serif);
    font-size: 19px;
    font-weight: 600;
    border-bottom: 1px solid var(--border-light);
    padding-bottom: 3px;
    margin: 20px 0 10px;
    color: var(--text);
    cursor: pointer;
    user-select: none;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .wiki-h2::after {
    content: '▼';
    font-size: 12px;
    color: var(--text-muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .wiki-h2.collapsed::after {
    transform: rotate(-90deg);
  }

  .wiki-section-body {
    overflow: hidden;
    max-height: 9999px;
    transition: max-height 0.3s ease;
  }

  .wiki-section-body.collapsed {
    max-height: 0;
  }

  .wiki-h3 {
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 600;
    margin: 14px 0 6px;
    color: var(--text);
  }

  .summary-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 16px;
  }

  .wiki-body { margin-bottom: 8px; }
  .body-h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin: 20px 0 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border-light);
  }
  .body-h4 {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin: 14px 0 4px;
  }
  .body-p {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    margin: 0 0 10px;
  }
  .body-ul {
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    padding-left: 20px;
    margin: 6px 0 10px;
  }
  .body-code {
    font-family: var(--font-mono);
    font-size: 12.5px;
    background: var(--bg);
    border: 1px solid var(--border-light);
    border-radius: 3px;
    padding: 1px 5px;
  }

  .body-table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13.5px;
    margin: 10px 0 14px;
    overflow-x: auto;
    display: block;
  }
  .body-table th, .body-table td {
    border: 1px solid var(--border-light);
    padding: 6px 10px;
    text-align: left;
    color: var(--text);
  }
  .body-table th {
    background: var(--infobox-header);
    font-weight: 600;
  }
  .body-table tr:nth-child(even) td {
    background: var(--surface);
  }

  .body-inline-img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
    margin: 8px 0;
    display: block;
    border: 1px solid var(--border-light);
  }

  /* 같이 보기 */
  .see-also-list { list-style: none; padding: 0; margin: 0 0 16px; }
  .see-also-item {
    padding: 8px 12px;
    border-left: 3px solid var(--accent, #4a7fc1);
    margin-bottom: 8px;
    background: var(--surface);
    border-radius: 0 4px 4px 0;
    font-size: 14px;
    line-height: 1.6;
  }
  .see-also-name { font-weight: 600; color: var(--text); }
  .see-also-link { margin-left: 6px; color: var(--accent, #4a7fc1); text-decoration: none; font-size: 12px; }
  .see-also-desc { color: var(--text-muted); }

  /* 타임라인 */
  .timeline { position: relative; padding-left: 0; }

  .tl-item {
    display: flex;
    gap: 0;
    position: relative;
    margin-bottom: 0;
  }

  .tl-gutter {
    width: 80px;
    flex-shrink: 0;
    padding-right: 16px;
    padding-top: 3px;
    text-align: right;
    position: relative;
  }

  .tl-gutter::after {
    content: '';
    position: absolute;
    right: -1px;
    top: 10px;
    bottom: -10px;
    width: 1px;
    background: var(--tl-line);
  }

  .tl-item:last-child .tl-gutter::after { display: none; }

  .tl-date {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    line-height: 1.3;
  }

  .tl-connector {
    width: 24px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 6px;
    position: relative;
  }

  .tl-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    border: 2px solid var(--surface);
    background: var(--tl-dot-old);
    flex-shrink: 0;
    z-index: 1;
  }

  .tl-item:first-child .tl-dot {
    background: var(--tl-dot);
    width: 12px;
    height: 12px;
  }

  .tl-connector::after {
    content: '';
    position: absolute;
    top: 18px;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    background: var(--tl-line);
  }

  .tl-item:last-child .tl-connector::after { display: none; }

  .tl-body {
    flex: 1;
    padding: 0 0 18px 12px;
  }

  .tl-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    background: var(--infobox-header);
    color: var(--text-muted);
    border: 1px solid var(--border-light);
    border-radius: 2px;
    padding: 1px 6px;
    margin-bottom: 5px;
  }

  .tl-item:first-child .tl-badge {
    background: #dce9f8;
    color: var(--accent);
    border-color: #c8d8f0;
  }

  .tl-content {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--text);
  }

  .tl-sources {
    margin-top: 4px;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* 연관 아이템 */
  .related-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .related-link {
    color: var(--accent);
    font-size: 13px;
    text-decoration: underline;
    cursor: pointer;
    padding: 2px 0;
  }

  .related-link:hover { color: #2a55aa; }

  .no-content {
    font-size: 13px;
    color: var(--text-dim);
    font-style: italic;
  }

  /* 코멘트 */
  .comment-item {
    border-left: 3px solid var(--border-light);
    padding: 6px 12px;
    margin-bottom: 10px;
    background: var(--comment-bg);
  }

  .comment-date {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    margin-bottom: 3px;
  }

  .comment-text {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* 목차 (TOC) */
  #toc {
    width: var(--toc-w);
    flex-shrink: 0;
    position: sticky;
    top: calc(var(--header-h) + 24px);
    align-self: flex-start;
    font-size: 12.5px;
    display: none;
  }

  #toc.visible { display: block; }

  /* 모바일 TOC — 접힘 가능 */
  #toc-mobile {
    display: none;
    border: 1px solid var(--border-light);
    background: var(--surface);
    margin-bottom: 14px;
    border-radius: 2px;
    overflow: hidden;
  }

  #toc-mobile.visible { display: block; }

  #toc-mobile-toggle {
    width: 100%;
    text-align: left;
    padding: 9px 12px;
    background: none;
    border: none;
    font-size: 13px;
    font-family: var(--font-sans);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: 500;
  }

  #toc-mobile-arrow {
    transition: transform .2s;
    font-size: 10px;
  }

  #toc-mobile-list {
    display: none;
    padding: 4px 12px 10px;
    list-style: none;
  }

  #toc-mobile-list.open { display: block; }

  #toc-mobile-list li {
    padding: 3px 0;
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
    font-size: 13px;
  }

  .toc-box {
    border: 1px solid var(--border-light);
    background: var(--surface);
    padding: 10px 12px;
  }

  .toc-title {
    font-weight: 500;
    font-size: 12px;
    margin-bottom: 6px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .toc-list { list-style: none; }

  .toc-item {
    padding: 2px 0;
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
    font-size: 12.5px;
  }

  .toc-item:hover { color: #2a55aa; }

  /* 빈 상태 */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 80px 20px;
    color: var(--text-dim);
    font-style: italic;
    font-family: var(--font-serif);
    font-size: 16px;
  }

  /* 에러 */
  #error-banner {
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    border-left: 4px solid var(--error-border);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text);
    margin-bottom: 16px;
    display: none;
    line-height: 1.6;
  }

  #error-banner.visible { display: block; }

  /* 그래프 뷰 */
  #graph-view {
    display: none;
    flex: 1;
    position: relative;
    background: var(--bg);
  }

  #graph-view.visible { display: block; }

  #graph-canvas {
    width: 100%;
    height: calc(100vh - var(--header-h));
    display: block;
    cursor: grab;
    touch-action: none;
  }

  #graph-canvas:active { cursor: grabbing; }

  #graph-tooltip {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text);
    pointer-events: none;
    opacity: 0;
    transition: opacity .12s;
    max-width: 180px;
    line-height: 1.4;
    z-index: 10;
    box-shadow: 1px 2px 4px rgba(0,0,0,.12);
  }

  #graph-tooltip.visible { opacity: 1; }

  #graph-controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .gc-btn {
    width: 36px;
    height: 36px;
    background: var(--surface);

      "body": "## 프로젝트 개요\n\n'무추망망이 집 만들기' 프로젝트의 핵심 기능 중 하나인 이미지 자동 크롭 기술을 개발하고 있다. 이 프로젝트는 가족들로부터 긍정적인 반응을 얻어 더욱 발전시킬 가치가 있는 아이디어로 평가받고 있다.\n\n![메신저 크롭 예시](attachment:drawing_1.jpg)\n\n## 기술 구현 방안\n\nOpenCV를 핵심 기술로 활용하여 이미지 자동 크롭 시스템을 구현할 예정이다. 특히 모바일 메신저 대화 화면의 스크린샷을 대상으로 하여, 필요한 부분만을 자동으로 추출하는 기능을 개발한다. 이를 통해 사용자가 수동으로 이미지를 편집할 필요 없이 자동화된 처리가 가능하다.\n\n![프로젝트 구조](attachment:drawing_2.jpg)\n\n## 활용 분야 및 확장성\n\n메신저 대화 스크린샷뿐만 아니라 다양한 형태의 이미지 처리에 응용할 수 있는 범용적인 크롭 기술로 확장 가능하다. 무추망망이 프로젝트의 전반적인 자동화 시스템에 통합되어 더 큰 가치를 창출할 수 있을 것으로 예상된다.",

<script>
const SAMPLE_WIKI = {

    }

};

let wiki = null;
let activeId = null;
let tocItems = [];

async function loadWiki() {
  if (typeof WIKI_DATA !== 'undefined') return WIKI_DATA;
  try {
    const resp = await fetch('./wiki.json');
    if (resp.ok) return await resp.json();
  } catch(e) {}
  return null;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(md, attachments) {
  // 이미지 참조 변환: ![alt](pic_drive_id) 또는 ![alt](attachment:filename)
  const atts = attachments || [];
  const attByFilename = {};
  atts.forEach(a => { if (a.filename) attByFilename[a.filename] = a; });

  // 1단계: 이스케이프 (일반 텍스트 전용 — HTML 삽입 전에 처리)
  let escaped = String(md||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // 2단계: 마크다운 → HTML 변환 (이스케이프된 텍스트 위에서 패턴 매칭)
  escaped = escaped
    .replace(/^### (.+)$/gm, '<h4 class="body-h4">$1</h4>')
    .replace(/^## (.+)$/gm, '<h3 class="body-h3">$1</h3>')
    .replace(/^# (.+)$/gm, '<h3 class="body-h3">$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code class="body-code">$1</code>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>[^]*?<\/li>\n?)+/g, m => `<ul class="body-ul">${m}</ul>`);

  // 3단계: 파이프 테이블 파싱 (라인 단위 처리)
  const lines = escaped.split('\n');
  const out = [];
  let tableLines = [];

  function flushTable() {
    if (!tableLines.length) return;
    let theadHtml = '', tbodyHtml = '';
    let headerDone = false;
    tableLines.forEach(row => {
      // 구분선 스킵
      if (/^\|?[\s\-:|]+\|/.test(row)) return;
      const cells = row.replace(/^\||\|$/g, '').split('|').map(c => c.trim());
      if (!headerDone) {
        theadHtml = `<thead><tr>${cells.map(c=>`<th>${c}</th>`).join('')}</tr></thead>`;
        headerDone = true;
      } else {
        tbodyHtml += `<tr>${cells.map(c=>`<td>${c}</td>`).join('')}</tr>`;
      }
    });
    out.push(`<table class="body-table">${theadHtml}<tbody>${tbodyHtml}</tbody></table>`);
    tableLines = [];
  }

  lines.forEach(line => {
    if (/^\|.+\|/.test(line)) {
      tableLines.push(line);
    } else {
      flushTable();
      out.push(line);
    }
  });
  flushTable();

  // 4단계: 이미지 참조 치환 (HTML 안전 상태에서 삽입)
  const withImgs = out.join('\n').replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, ref) => {
    const safeAlt = alt.replace(/"/g,'&quot;');
    if (ref.startsWith('attachment:')) {
      const fname = ref.slice('attachment:'.length);
      const att = attByFilename[fname];
      if (att?.pic_drive_id) {
        return `<img src="https://lh3.googleusercontent.com/d/${att.pic_drive_id}" alt="${safeAlt}" class="body-inline-img">`;
      }
      return match;
    }
    if (/^[A-Za-z0-9_-]{10,}$/.test(ref)) {
      return `<img src="https://lh3.googleusercontent.com/d/${ref}" alt="${safeAlt}" class="body-inline-img">`;
    }
    return match;
  });

  // 5단계: 빈 줄 기준 블록 분리 → <p> 래핑
  const html = withImgs
    .split(/\n\n+/)
    .map(block => {
      if (/^<[hultib]/.test(block.trim())) return block;
      return `<p class="body-p">${block.replace(/\n/g,'<br>')}</p>`;
    })
    .join('\n');

  return html;
}

function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' }); }
  catch { return iso; }
}

function fmtWeek(w) {
  if (!w) return '';
  try { return new Date(w).toLocaleDateString('ko-KR', { year:'numeric', month:'short', day:'numeric' }); }
  catch { return w; }
}

// ── 사이드바 드로어 (모바일) ────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const isOpen = sidebar.classList.contains('open');
  if (isOpen) closeSidebar();
  else openSidebar();
}

function openSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.add('open');
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

// ── 하단 탭바 ───────────────────────────────────────────────
function bbTab(tab) {
  ['list','wiki','graph'].forEach(t => {
    document.getElementById('bb-'+t)?.classList.toggle('active', t === tab);
  });

  if (tab === 'list') {
    openSidebar();
    // 목록 탭은 다른 뷰 전환 없이 드로어만 열기
    document.getElementById('bb-list').classList.add('active');
  } else if (tab === 'wiki') {
    closeSidebar();
    switchView('wiki');
  } else if (tab === 'graph') {
    closeSidebar();
    switchView('graph');
  }
}

// ── 모바일 TOC 접힘 ─────────────────────────────────────────
function toggleMobileToc() {
  const list = document.getElementById('toc-mobile-list');
  const arrow = document.getElementById('toc-mobile-arrow');
  const isOpen = list.classList.contains('open');
  list.classList.toggle('open', !isOpen);
  arrow.style.transform = isOpen ? '' : 'rotate(180deg)';
}

function renderSidebar(items) {
  const list = document.getElementById('item-list');
  document.getElementById('item-count').textContent = items.length;
  if (!items.length) {
    list.innerHTML = '<div style="padding:14px;font-size:13px;color:var(--text-dim);font-style:italic">결과 없음</div>';
    return;
  }
  list.innerHTML = items.map(item => {
    const week = item.versions?.[0]?.week || '';
    return `<div class="item-entry${item.id === activeId ? ' active' : ''}" data-id="${esc(item.id)}">
      <div class="entry-title">${esc(item.title)}</div>
      ${week ? `<div class="entry-week">${fmtWeek(week)}</div>` : ''}
    </div>`;
  }).join('');
  list.querySelectorAll('.item-entry').forEach(el =>
    el.addEventListener('click', () => {
      selectItem(el.dataset.id);
      // 모바일에서 아이템 선택 시 드로어 닫기 + 위키 뷰로 전환
      if (window.innerWidth <= 640) {
        closeSidebar();
        switchView('wiki');
        // 하단 탭바 업데이트
        ['list','wiki','graph'].forEach(t =>
          document.getElementById('bb-'+t)?.classList.toggle('active', t === 'wiki')
        );
      }
    })
  );
}

function buildAttachHtml(item) {
  if (!item.attachments?.length) return '';
  return `
    <h2 class="wiki-h2" id="sec-attachments">이미지 첨부</h2>
    ${item.attachments.map(att => {
      const picUrl = att.pic_drive_id
        ? `https://lh3.googleusercontent.com/d/${att.pic_drive_id}`
        : null;
      const thumbHtml = picUrl
        ? `<img class="attach-thumb" src="${picUrl}"
              alt="${esc(att.description || att.summary || '')}"
              onclick="window.open('https://drive.google.com/file/d/${att.pic_drive_id}/view','_blank')"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
           /><div class="attach-thumb-placeholder" style="display:none">🖼️</div>`
        : `<div class="attach-thumb-placeholder">🖼️</div>`;
      return `
      <div class="attach-card">
        ${thumbHtml}
        <div class="attach-meta">
          <div class="attach-filename">${esc(att.filename||'')}</div>
          <div class="attach-summary">${esc(att.summary||'')}</div>
          ${att.description ? `<div class="attach-desc">${esc(att.description)}</div>` : ''}
          ${att.ocr_text ? `<div class="attach-ocr">${esc(att.ocr_text)}</div>` : ''}
        </div>
      </div>`;
    }).join('')}`;
}

function selectItem(id) {
  activeId = id;
  document.querySelectorAll('.item-entry').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id)
  );

  const item = wiki.items.find(i => i.id === id);
  if (!item) return;

  document.getElementById('empty-state').style.display = 'none';
  const doc = document.getElementById('wiki-doc');
  doc.classList.add('visible');

  const latestWeek = item.versions?.[0]?.week;
  const tagsHtml = (item.tags||[]).map(t => `<span class="doc-tag">${esc(t)}</span>`).join(' ');
  const relatedItems = (item.related||[]).map(rid => wiki.items.find(i=>i.id===rid)).filter(Boolean);

  const versionsHtml = !item.versions?.length
    ? '<p class="no-content">버전 기록 없음</p>'
    : item.versions.map((v, i) => `
        <div class="tl-item">
          <div class="tl-gutter"><div class="tl-date">${v.week||''}</div></div>
          <div class="tl-connector"><div class="tl-dot"></div></div>
          <div class="tl-body">
            <div class="tl-badge">${i===0 ? '최신' : fmtWeek(v.week)}</div>
            <div class="tl-content">${esc(v.content||'')}</div>
            ${v.source_note_ids?.length ? `<div class="tl-sources">노트 ${v.source_note_ids.length}개 기반</div>` : ''}
          </div>
        </div>`).join('');

  const relatedHtml = !relatedItems.length
    ? '<p class="no-content">연관 아이템 없음</p>'
    : `<div class="related-list">${relatedItems.map(r =>
        `<span class="related-link" data-id="${r.id}">${esc(r.title)}</span>`
      ).join('<span style="color:var(--border);margin:0 2px"> · </span>')}</div>`;

  const comments = (item.comments||[]).slice().sort((a,b)=>b.date.localeCompare(a.date));
  const commentsHtml = !comments.length ? '' : `
    <h2 class="wiki-h2" id="sec-comments">코멘트</h2>
    ${comments.map(c => `
      <div class="comment-item">
        <div class="comment-date">${esc(c.date)}</div>
        <div class="comment-text">${esc(c.text||'')}</div>
      </div>`).join('')}`;

  const attachmentsHtml = buildAttachHtml(item);
  const hasAttachments = !!item.attachments?.length;

  // TOC 구성
  tocItems = [
    { id: 'sec-summary', label: '개요' },
    ...(item.body ? [{ id: 'sec-body', label: '상세 내용' }] : []),
    { id: 'sec-history', label: '버전 히스토리' },
    ...(hasAttachments ? [{ id: 'sec-attachments', label: '이미지 첨부' }] : []),
    ...(comments.length ? [{ id: 'sec-comments', label: '코멘트' }] : []),
    ...((item.see_also?.length) ? [{ id: 'sec-see-also', label: '같이 보기' }] : []),
    { id: 'sec-related', label: '연관 아이템' },
  ];

  const tocHtml = tocItems.map(t =>
    `<li class="toc-item" onclick="document.getElementById('${t.id}')?.scrollIntoView({behavior:'smooth'})">${t.label}</li>`
  ).join('');

  // 데스크탑 TOC
  document.getElementById('toc-list').innerHTML = tocHtml;
  document.getElementById('toc').classList.add('visible');

  // 모바일 TOC
  const mobileTocList = document.getElementById('toc-mobile-list');
  mobileTocList.innerHTML = tocItems.map(t =>
    `<li onclick="document.getElementById('${t.id}')?.scrollIntoView({behavior:'smooth'});toggleMobileToc()">${t.label}</li>`
  ).join('');
  document.getElementById('toc-mobile').classList.add('visible');

  document.getElementById('doc-content').innerHTML = `
    <h1 class="doc-title">${esc(item.title)}</h1>
    <div class="clearfix">
      <div class="infobox">
        <div class="infobox-header">아이디어 요약<i class="infobox-toggle-icon">▼</i></div>
        <div class="infobox-body">
          <div class="infobox-row">
            <div class="infobox-label">분류</div>
            <div class="infobox-val infobox-tags">${(item.tags||[]).map(t=>`<span class="doc-tag">${esc(t)}</span>`).join(' ')}</div>
          </div>
          <div class="infobox-row">
            <div class="infobox-label">버전 수</div>
            <div class="infobox-val">${item.versions?.length||0}개</div>
          </div>
          ${latestWeek ? `<div class="infobox-row">
            <div class="infobox-label">최신</div>
            <div class="infobox-val">${fmtWeek(latestWeek)}</div>
          </div>` : ''}
          ${relatedItems.length ? `<div class="infobox-row">
            <div class="infobox-label">연관</div>
            <div class="infobox-val">${relatedItems.map(r=>`<span class="related-link" data-id="${r.id}" style="font-size:12px">${esc(r.title)}</span>`).join(', ')}</div>
          </div>` : ''}
        </div>
      </div>

      <h2 class="wiki-h2" id="sec-summary">개요</h2>
      <p class="summary-text">${esc(item.summary||'개요 없음')}</p>
    </div>

    ${item.body ? `
    <h2 class="wiki-h2" id="sec-body">상세 내용</h2>
    <div class="wiki-body">${renderMarkdown(item.body, item.attachments||[])}</div>` : ''}

    ${item.see_also?.length ? `
    <h2 class="wiki-h2" id="sec-see-also">같이 보기</h2>
    <ul class="see-also-list">
      ${item.see_also.map(s => `
      <li class="see-also-item">
        <span class="see-also-name">${esc(s.name||'')}</span>
        ${s.url ? `<a href="${esc(s.url)}" target="_blank" class="see-also-link">↗</a>` : ''}
        ${s.description ? `<span class="see-also-desc"> — ${esc(s.description)}</span>` : ''}
      </li>`).join('')}
    </ul>` : ''}

    <h2 class="wiki-h2" id="sec-history">버전 히스토리</h2>
    <div class="timeline">${versionsHtml}</div>

    ${attachmentsHtml}
    ${commentsHtml}

    <h2 class="wiki-h2" id="sec-related">연관 아이템</h2>
    ${relatedHtml}
  `;

  doc.querySelectorAll('.related-link').forEach(el =>
    el.addEventListener('click', () => {
      selectItem(el.dataset.id);
      document.querySelector(`.item-entry[data-id="${el.dataset.id}"]`)?.scrollIntoView({ block:'nearest' });
    })
  );

  // 모바일에서 인포박스 기본 접힘 + 헤더 클릭 토글
  const infobox = doc.querySelector('.infobox');
  if (infobox) {
    const isMobile = window.innerWidth <= 640;
    if (isMobile) {
      infobox.classList.add('collapsed');
    }
    infobox.querySelector('.infobox-header')?.addEventListener('click', () => {
      if (window.innerWidth <= 640) {
        infobox.classList.toggle('collapsed');
      }
    });
  }

  // wiki-h2 섹션 래핑 및 접기/펼치기
  const content = document.getElementById('doc-content');
  const h2els = content.querySelectorAll('.wiki-h2');
  h2els.forEach(h2 => {
    // h2 다음 형제 요소들을 wiki-section-body로 래핑
    const body = document.createElement('div');
    body.className = 'wiki-section-body';
    let sibling = h2.nextElementSibling;
    while (sibling && !sibling.classList.contains('wiki-h2')) {
      const next = sibling.nextElementSibling;
      body.appendChild(sibling);
      sibling = next;
    }
    h2.insertAdjacentElement('afterend', body);
    h2.addEventListener('click', () => {
      h2.classList.toggle('collapsed');
      body.classList.toggle('collapsed');
    });
  });

  document.getElementById('main').scrollTo({ top: 0, behavior: 'smooth' });
}

function filterItems(q) {
  if (!wiki) return;
  const query = q.toLowerCase().trim();
  if (!query) { renderSidebar(wiki.items); return; }
  renderSidebar(wiki.items.filter(item =>
    item.title.toLowerCase().includes(query) ||
    (item.tags||[]).some(t => t.toLowerCase().includes(query)) ||
    (item.summary||'').toLowerCase().includes(query)
  ));
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.innerHTML = msg;
  el.classList.add('visible');
}

let currentView = 'wiki';
let graphState = null;

function switchView(view) {
  currentView = view;
  const graphPanel = document.getElementById('graph-view');
  const mainPanel = document.getElementById('main');
  const btnWiki = document.getElementById('btn-wiki');
  const btnGraph = document.getElementById('btn-graph');

  if (view === 'graph') {
    mainPanel.style.display = 'none';
    graphPanel.classList.add('visible');
    btnGraph?.classList.add('active');
    btnWiki?.classList.remove('active');
    if (wiki) renderGraph(wiki.items||[]);
  } else {
    mainPanel.style.display = '';
    graphPanel.classList.remove('visible');
    btnWiki?.classList.add('active');
    btnGraph?.classList.remove('active');
  }
}

// ── 그래프 렌더링 (터치 지원 포함) ──────────────────────────
const TAG_COLORS = ['#3366cc','#cc3333','#339933','#cc6600','#663399','#006666','#993366','#336699'];

function renderGraph(items) {
  const canvas = document.getElementById('graph-canvas');
  const tooltip = document.getElementById('graph-tooltip');
  const parent = document.getElementById('graph-view');
  const ctx = canvas.getContext('2d');

  const dpr = window.devicePixelRatio||1;
  const W = parent.clientWidth;
  const H = parent.clientHeight;
  canvas.width = W*dpr; canvas.height = H*dpr;
  ctx.scale(dpr, dpr);

  const allTags = [...new Set(items.flatMap(i=>i.tags||[]))];
  const tagColor = {};
  allTags.forEach((t,i) => { tagColor[t] = TAG_COLORS[i%TAG_COLORS.length]; });

  const nodeMap = {};
  items.forEach(item => { nodeMap[item.id] = item; });

  const nodes = items.map((item, i) => {
    const angle = 2*Math.PI*i/items.length;
    const r = Math.min(W,H)*0.3;
    return {
      id: item.id, title: item.title, tags: item.tags||[],
      color: tagColor[(item.tags||[])[0]]||'#3366cc',
      x: W/2+r*Math.cos(angle)+(Math.random()-.5)*30,
      y: H/2+r*Math.sin(angle)+(Math.random()-.5)*30,
      vx:0, vy:0, radius:10
    };
  });

  const edges = [], seen = new Set();
  items.forEach(item => {
    (item.related||[]).forEach(rid => {
      const key = [item.id,rid].sort().join('--');
      if (seen.has(key)||!nodeMap[rid]) return;
      seen.add(key);
      const explicit = (item.explicit_related||[]).includes(rid);
      edges.push({ from:item.id, to:rid, explicit });
    });
  });

  const nodeIdx = {};
  nodes.forEach((n,i) => { nodeIdx[n.id]=i; });

  let transform = {x:0,y:0,scale:1};
  let dragging=null, panning=null, hoveredNode=null;
  let simRunning=true, frameCnt=0, animFrame=null;

  function tick() {
    const repulse=4000, linkDist=130, linkStr=0.04, alpha=0.08, centerStr=0.012;
    for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++) {
      const a=nodes[i],b=nodes[j];
      let dx=b.x-a.x, dy=b.y-a.y;
      const d2=dx*dx+dy*dy+.01, f=repulse/d2, d=Math.sqrt(d2);
      a.vx-=f*dx/d; a.vy-=f*dy/d; b.vx+=f*dx/d; b.vy+=f*dy/d;
    }
    edges.forEach(e => {
      const a=nodes[nodeIdx[e.from]], b=nodes[nodeIdx[e.to]];
      if(!a||!b) return;
      let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      const f=(d-linkDist)*linkStr;
      a.vx+=f*dx/d; a.vy+=f*dy/d; b.vx-=f*dx/d; b.vy-=f*dy/d;
    });
    nodes.forEach(n => { n.vx+=(W/2-n.x)*centerStr; n.vy+=(H/2-n.y)*centerStr; });
    nodes.forEach(n => {
      if(dragging&&dragging.node===n) return;
      n.vx*=(1-alpha); n.vy*=(1-alpha);
      n.x+=n.vx; n.y+=n.vy;
    });
  }

  function draw() {
    ctx.clearRect(0,0,W,H);
    ctx.save();
    ctx.translate(transform.x,transform.y);
    ctx.scale(transform.scale,transform.scale);

    edges.forEach(e => {
      const a=nodes[nodeIdx[e.from]], b=nodes[nodeIdx[e.to]];
      if(!a||!b) return;
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.strokeStyle = e.explicit ? 'rgba(51,102,204,0.6)' : 'rgba(162,169,177,0.5)';
      ctx.lineWidth = e.explicit ? 2.5 : 1.5;
      ctx.stroke();
    });

    nodes.forEach(n => {
      const isHov = hoveredNode===n;
      const r = isHov ? n.radius+3 : n.radius;
      ctx.beginPath(); ctx.arc(n.x,n.y,r,0,2*Math.PI);
      ctx.fillStyle = isHov ? n.color : n.color+'cc';
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.font = `${isHov?12:11}px "Noto Sans KR", sans-serif`;
      ctx.fillStyle = isHov
        ? getComputedStyle(document.documentElement).getPropertyValue('--graph-node-label-hover').trim()
        : getComputedStyle(document.documentElement).getPropertyValue('--graph-node-label').trim();
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      let label = n.title;
      const maxW = 85;
      if(ctx.measureText(label).width>maxW) {
        while(label.length>2&&ctx.measureText(label+'…').width>maxW) label=label.slice(0,-1);
        label+='…';
      }
      ctx.fillText(label, n.x, n.y+r+4);
    });
    ctx.restore();
  }

  function loop() {
    if(simRunning){tick();frameCnt++;if(frameCnt>300)simRunning=false;}
    draw();
    animFrame=requestAnimationFrame(loop);
  }

  if(graphState?.animFrame) cancelAnimationFrame(graphState.animFrame);
  graphState = {animFrame:null};

  function canvasPos(clientX, clientY) {
    const rect=canvas.getBoundingClientRect();
    return {
      x:(clientX-rect.left-transform.x)/transform.scale,
      y:(clientY-rect.top-transform.y)/transform.scale
    };
  }

  function hitNode(cx,cy) {
    for(let i=nodes.length-1;i>=0;i--) {
      const n=nodes[i], dx=cx-n.x, dy=cy-n.y;
      if(dx*dx+dy*dy<=(n.radius+8)**2) return n;
    }
    return null;
  }

  // ── 마우스 이벤트 ──
  canvas.onmousedown = e => {
    const {x,y}=canvasPos(e.clientX, e.clientY), hit=hitNode(x,y);
    if(hit) { dragging={node:hit,ox:x-hit.x,oy:y-hit.y}; simRunning=true; frameCnt=0; }
    else panning={sx:e.clientX,sy:e.clientY,tx:transform.x,ty:transform.y};
  };

  canvas.onmousemove = e => {
    if(dragging){const{x,y}=canvasPos(e.clientX,e.clientY);dragging.node.x=x-dragging.ox;dragging.node.y=y-dragging.oy;return;}
    if(panning){transform.x=panning.tx+(e.clientX-panning.sx);transform.y=panning.ty+(e.clientY-panning.sy);return;}
    const{x,y}=canvasPos(e.clientX,e.clientY),hit=hitNode(x,y),prev=hoveredNode;
    hoveredNode=hit;
    if(hit!==prev){simRunning=true;frameCnt=0;}
    if(hit){
      const rect=canvas.getBoundingClientRect();
      tooltip.style.left=(e.clientX-rect.left+14)+'px';
      tooltip.style.top=(e.clientY-rect.top-10)+'px';
      tooltip.innerHTML=`<b>${esc(hit.title)}</b>${hit.tags.length?'<br><span style="color:#3366cc;font-size:10px">'+hit.tags.map(t=>'#'+esc(t)).join(' ')+'</span>':''}`;
      tooltip.classList.add('visible');
      canvas.style.cursor='pointer';
    } else { tooltip.classList.remove('visible'); canvas.style.cursor='grab'; }
  };

  canvas.onmouseup = () => { dragging=null; panning=null; };

  canvas.onclick = e => {
    const{x,y}=canvasPos(e.clientX,e.clientY),hit=hitNode(x,y);
    if(hit){switchView('wiki');selectItem(hit.id);document.querySelector(`.item-entry[data-id="${hit.id}"]`)?.scrollIntoView({block:'nearest'});}
  };

  canvas.onwheel = e => {
    e.preventDefault();
    const rect=canvas.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const delta=e.deltaY>0?.85:1.18, ns=Math.max(.2,Math.min(4,transform.scale*delta));
    transform.x=mx-(mx-transform.x)*(ns/transform.scale);
    transform.y=my-(my-transform.y)*(ns/transform.scale);
    transform.scale=ns;
  };

  // ── 터치 이벤트 (핀치줌 + 드래그) ──
  let lastTouches = null;
  let touchDragging = null;
  let touchPanning = null;
  let pinchStartDist = null;
  let pinchStartScale = null;
  let pinchStartCenter = null;
  let pinchStartTx = null, pinchStartTy = null;
  let tapTimeout = null;
  let tapCandidate = null;

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    simRunning = true; frameCnt = 0;

    if (e.touches.length === 1) {
      const t = e.touches[0];
      const {x,y} = canvasPos(t.clientX, t.clientY);
      const hit = hitNode(x, y);

      tapCandidate = hit;
      if (tapTimeout) clearTimeout(tapTimeout);
      tapTimeout = setTimeout(() => { tapCandidate = null; }, 300);

      if (hit) {
        touchDragging = { node: hit, ox: x - hit.x, oy: y - hit.y };
      } else {
        touchPanning = { sx: t.clientX, sy: t.clientY, tx: transform.x, ty: transform.y };
      }
    } else if (e.touches.length === 2) {
      touchDragging = null; touchPanning = null;
      const t1 = e.touches[0], t2 = e.touches[1];
      const cx = (t1.clientX + t2.clientX) / 2;
      const cy = (t1.clientY + t2.clientY) / 2;
      const rect = canvas.getBoundingClientRect();
      pinchStartCenter = { x: cx - rect.left, y: cy - rect.top };
      pinchStartDist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
      pinchStartScale = transform.scale;
      pinchStartTx = transform.x;
      pinchStartTy = transform.y;
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();

    if (e.touches.length === 1) {
      const t = e.touches[0];
      if (touchDragging) {
        const {x,y} = canvasPos(t.clientX, t.clientY);
        touchDragging.node.x = x - touchDragging.ox;
        touchDragging.node.y = y - touchDragging.oy;
      } else if (touchPanning) {
        transform.x = touchPanning.tx + (t.clientX - touchPanning.sx);
        transform.y = touchPanning.ty + (t.clientY - touchPanning.sy);
      }
    } else if (e.touches.length === 2 && pinchStartDist !== null) {
      const t1 = e.touches[0], t2 = e.touches[1];
      const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
      const ratio = dist / pinchStartDist;
      const ns = Math.max(.2, Math.min(4, pinchStartScale * ratio));
      const cx = pinchStartCenter.x;
      const cy = pinchStartCenter.y;
      transform.scale = ns;
      transform.x = cx - (cx - pinchStartTx) * (ns / pinchStartScale);
      transform.y = cy - (cy - pinchStartTy) * (ns / pinchStartScale);
    }
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    if (e.touches.length === 0) {
      // 탭으로 노드 클릭
      if (tapCandidate && touchDragging?.node === tapCandidate) {
        const hit = tapCandidate;
        switchView('wiki');
        selectItem(hit.id);
        document.querySelector(`.item-entry[data-id="${hit.id}"]`)?.scrollIntoView({block:'nearest'});
        // 모바일 하단탭 업데이트
        ['list','wiki','graph'].forEach(t =>
          document.getElementById('bb-'+t)?.classList.toggle('active', t === 'wiki')
        );
      }
      touchDragging = null; touchPanning = null;
      pinchStartDist = null;
    } else if (e.touches.length === 1) {
      // 핀치 종료 후 한 손가락만 남은 경우
      const t = e.touches[0];
      touchPanning = { sx: t.clientX, sy: t.clientY, tx: transform.x, ty: transform.y };
      pinchStartDist = null;
    }
  }, { passive: false });

  document.getElementById('gc-zoom-in').onclick=()=>{transform.scale=Math.min(4,transform.scale*1.25);simRunning=true;frameCnt=0;};
  document.getElementById('gc-zoom-out').onclick=()=>{transform.scale=Math.max(.2,transform.scale*.8);simRunning=true;frameCnt=0;};
  document.getElementById('gc-reset').onclick=()=>{transform={x:0,y:0,scale:1};simRunning=true;frameCnt=0;};

  animFrame=requestAnimationFrame(loop);
  graphState.animFrame=animFrame;
}

// ── 테마 전환 ────────────────────────────────────────────────
const THEMES = [
  { key: 'wiki', label: '🌙 다크', next: 'dark' },
  { key: 'dark', label: '☀️ 라이트', next: 'wiki' },
];

function applyTheme(key) {
  document.documentElement.setAttribute('data-theme', key);
  const t = THEMES.find(t => t.key === key) || THEMES[0];
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = t.label;
  const bbIcon = document.getElementById('bb-theme-icon');
  if (bbIcon) bbIcon.textContent = key === 'dark' ? '☀️' : '🌙';
  try { localStorage.setItem('wiki-theme', key); } catch(e) {}
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'wiki';
  const t = THEMES.find(t => t.key === current) || THEMES[0];
  applyTheme(t.next);
}

async function init() {
  try {
    const saved = localStorage.getItem('wiki-theme');
    if (saved) applyTheme(saved);
  } catch(e) {}

  const overlay = document.getElementById('load-overlay');
  let data = await loadWiki();
  let usingSample = false;

  if (!data) {
    usingSample = true;
    data = SAMPLE_WIKI;
    showError('⚠️ <b>wiki.json을 찾을 수 없습니다.</b> 샘플 데이터로 표시 중입니다.');
  }

  wiki = data;

  const count = wiki.items?.length||0;
  const updatedAt = fmtDate(wiki.updated_at);
  document.getElementById('meta-info').textContent =
    `아이템 ${count}개${updatedAt?' · '+updatedAt:''}${usingSample?' (샘플)':''}`;

  renderSidebar(wiki.items||[]);
  document.getElementById('search').addEventListener('input', e => filterItems(e.target.value));

  if (wiki.items?.length>0) selectItem(wiki.items[0].id);

  overlay.classList.add('hidden');
  setTimeout(()=>overlay.style.display='none', 350);
}

init();
</script>
